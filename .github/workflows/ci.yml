name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: yandex_alice_openai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d yandex_alice_openai"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: make install-deps
      - run: make ensure-env
      - uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: prek|${{ runner.os }}|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            prek|${{ runner.os }}|
      - uses: j178/prek-action@v2
        with:
          extra-args: --all-files --hook-stage pre-commit

  publish:
    needs: check
    if: github.ref == 'refs/heads/main'
    uses: hu553in/common-things/.github/workflows/build-publish-docker.yml@main
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      image: ghcr.io/${{ github.repository }}

  attest:
    needs: publish
    uses: hu553in/common-things/.github/workflows/attest-docker.yml@main
    permissions:
      id-token: write
      attestations: write
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.publish.outputs.digest }}
