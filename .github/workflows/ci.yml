name: ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.2-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: alice_openai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d alice_openai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      APP_LOG_LEVEL: INFO
      APP_METRICS_ENABLED: "true"
      APP_TRACING_ENABLED: "false"
      APP_RATE_LIMIT_PER_MINUTE: "100"
      REDIS_URL: redis://localhost:6379/0
      REDIS_PREFIX: alice-openai-ci
      REDIS_SESSION_TTL_SECONDS: "86400"
      REDIS_SESSION_TURN_LIMIT: "24"
      REDIS_PENDING_TTL_SECONDS: "1800"
      REDIS_IDEMPOTENCY_TTL_SECONDS: "900"
      REDIS_RATE_LIMIT_WINDOW_SECONDS: "60"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/alice_openai
      DATABASE_ECHO: "false"
      OPENAI_API_KEY: test-key
      OPENAI_MODEL: gpt-5-mini
      OPENAI_TIMEOUT_SECONDS: "2.2"
      OPENAI_MAX_RETRIES: "1"
      OPENAI_SYSTEM_PROMPT: test prompt
      WORKER_POLL_TIMEOUT_MS: "1000"
      WORKER_IDLE_SLEEP_SECONDS: "0.2"
      WORKER_JOB_TIMEOUT_SECONDS: "20.0"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src tests
      - run: uv run pytest

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          labels: |
            org.opencontainers.image.title=alice-openai-backend
            org.opencontainers.image.description=Production-grade Yandex Alice backend using the OpenAI Responses API
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
