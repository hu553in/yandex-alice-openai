x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: 4
      compress: "true"
      mode: non-blocking
      max-buffer-size: 4m

services:
  api:
    <<: *common
    build: .
    command: ["uv", "run", "--no-dev", "yandex-alice-openai-api"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/yandex_alice_openai
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    <<: *common
    build: .
    command: ["uv", "run", "--no-dev", "yandex-alice-openai-worker"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/yandex_alice_openai
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis:
    <<: *common
    image: redis:8.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    <<: *common
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: yandex_alice_openai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yandex_alice_openai"]
      interval: 5s
      timeout: 3s
      retries: 10
